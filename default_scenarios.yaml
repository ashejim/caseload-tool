# Starter actions for a new install. These are SAMPLES — edit them to make
# them yours, or delete the ones you don't need. Each one files a Salesforce
# note (what the caseload is all about); some also send an email or a text.
# Batch samples ship with preview ON, so nothing sends until you review it.
scenarios:

  # SINGLE-FIRE: press F3 with a student's note panel open in Salesforce to
  # fill a note. submit is OFF, so it fills the form for you to review and
  # submit — a safe way to try it (Salesforce notes can't be deleted).
  Sample - quick note:
    hotkey: F3
    close_tab_after: false
    find_first: false
    panel_action: true
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: Reached out to the student about their progress.
      academic_activities: []
      submit: false
      append_clipboard: false
      enter_additional_text: false

  # CASELOAD-PANEL: pick a student in the viewer, then fire this to send a
  # follow-up email AND log a note in one step.
  Sample - follow-up email:
    hotkey: ''
    close_tab_after: false
    find_first: false
    panel_action: true
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: Sent a follow-up email to the student.
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: Following up, {{first_name}}
      body_html_file: sample_followup.html
      to: ''
      signature_file: ''
      inline_images: []
      cc_pm: false

  # BATCH (note + email + text): emails AND texts every student the filter
  # matches, and logs a note for each. Edit YOUR_COURSE to your course code.
  # Preview is ON — you review the recipient list before anything sends.
  Sample - welcome (batch):
    hotkey: ''
    close_tab_after: false
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: Sent a welcome email and text to the newly assigned student.
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: Welcome to {{course_code}}, {{first_name}}!
      body_html_file: sample_welcome.html
      to: ''
      signature_file: ''
      inline_images: []
      cc_pm: false
    text:
      body: Hi {{first_name}}! This is {{user_name}}, your {{course_code}} instructor.
        Welcome aboard — reply any time if you have questions.
      body_file: ''
      schedule: true
      window_start_hour: 10
      window_end_hour: 16
      inbox_label: ''
      commit: false
    batch:
      filters:
      - column: Course Code
        op: is
        value: YOUR_COURSE
      - column: Last Assigned CI Contact
        op: is empty
        value: ''
      preview: true

  # BATCH (note + email, no text): congratulate students who passed Task 1.
  # Edit YOUR_COURSE and the filter to match how your course marks Task 1.
  # Preview is ON.
  Sample - Task 1 passed (batch):
    hotkey: ''
    close_tab_after: false
    find_first: false
    notes:
    - interaction_format: Single Interaction
      interaction_type: Email to Student
      body: Congratulated the student on passing Task 1.
      academic_activities: []
      submit: true
      append_clipboard: false
      enter_additional_text: false
    email:
      subject: Nice work on Task 1, {{first_name}}!
      body_html_file: sample_task1_passed.html
      to: ''
      signature_file: ''
      inline_images: []
      cc_pm: false
    batch:
      filters:
      - column: Course Code
        op: is
        value: YOUR_COURSE
      preview: true

groups:
- name: Sample single actions (edit or delete me)
  color: '#2f75c9'
  scenarios:
  - Sample - quick note
  - Sample - follow-up email
- name: Sample batch actions (edit or delete me)
  color: '#2f9e44'
  scenarios:
  - Sample - welcome (batch)
  - Sample - Task 1 passed (batch)
